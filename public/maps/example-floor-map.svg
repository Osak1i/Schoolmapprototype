<svg width="720" height="450" viewBox="0 0 720 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="720" height="450" fill="#fafafa"/>

  <!-- Vertical Hallways -->
  <rect x="210" y="40" width="40" height="320" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <rect x="400" y="40" width="40" height="320" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>

  <!-- Horizontal Hallways -->
  <rect x="210" y="70" width="230" height="40" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <rect x="210" y="180" width="230" height="40" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <rect x="210" y="290" width="230" height="40" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>

  <!-- Entrance Hallway -->
  <rect x="340" y="360" width="40" height="60" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>

  <!-- Room Outlines (Optional - rooms are rendered dynamically by the app) -->
  <!-- Left Wing -->
  <rect x="50" y="50" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="50" y="160" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="50" y="270" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>

  <!-- Center -->
  <rect x="300" y="50" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="300" y="160" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="300" y="270" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>

  <!-- Right Wing -->
  <rect x="550" y="50" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="550" y="160" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
  <rect x="550" y="270" width="120" height="80" fill="white" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>

  <!-- Decorative Elements (Optional) -->
  <!-- Main Entrance Area -->
  <rect x="335" y="405" width="50" height="35" fill="#A5968A" stroke="#8B7E73" stroke-width="2" opacity="0.3"/>
</svg>
